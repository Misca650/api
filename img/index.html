<!DOCTYPE html>
<html>
<body>

<script>
(async function () {
    try {
        const path = window.location.pathname;

        if (!path.includes("/img/")) {
            document.body.innerText = JSON.stringify({ error: "invalid path" });
            return;
        }

        // 🔥 decode url
        const encoded = path.split("/img/")[1];
        const url = atob(encoded);

        // โหลดรูป
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

        await new Promise((res, rej) => {
            img.onload = res;
            img.onerror = rej;
        });

        const size = 50;

        // 🔥 สร้าง canvas (ไม่ใช้ getElementById)
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = size;
        canvas.height = size;

        ctx.drawImage(img, 0, 0, size, size);

        const data = ctx.getImageData(0, 0, size, size).data;

        let matrix = [];

        for (let y = 0; y < size; y++) {
            let row = [];

            for (let x = 0; x < size; x++) {
                const i = (y * size + x) * 4;

                row.push([
                    data[i],
                    data[i + 1],
                    data[i + 2]
                ]);
            }

            matrix.push(row);
        }

        // 🔥 สำคัญ: ส่ง JSON ล้วน
        document.body.innerText = JSON.stringify({ matrix });

    } catch (e) {
        document.body.innerText = JSON.stringify({ error: "fail" });
    }
})();
</script>

</body>
</html>
